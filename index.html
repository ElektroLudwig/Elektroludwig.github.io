<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Elektroludwig | Elektroinštalácie</title>

  <link rel="icon" type="image/png" href="./zalozka.png?v=2">
  <link rel="shortcut icon" type="image/png" href="./zalozka.png?v=2">
  <link rel="apple-touch-icon" href="./zalozka.png?v=2">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    /* 🔝 TOPBAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 40px;
      background: #f5f5f5;
      font-size: 13px;
    }

    .topbar-left {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .topbar-right {
      text-align: right;
    }

    .topbar a {
      transition: transform 0.2s;
    }

    .topbar a:hover {
      transform: scale(1.6);
    }

    /* 🔲 HEADER (nižší + väčšie logo) */
    .header {
      text-align: center;
      padding: 8px 0; /* menej miesta */
      background: white;
    }

    .logo {
      max-width: 420px; /* väčšie logo */
      height: auto;
    }

    /* 🔽 MENU */
    .menu {
      background: white; /* biele pozadie */
      display: flex;
      justify-content: center;
      border-top: 1px solid #eee;
      border-bottom: 1px solid #eee;
    }

    .menu-item {
      position: relative;
    }

    .menu-item > a {
      display: block;
      color: black; /* čierny text */
      padding: 14px 28px;
      font-weight: bold;
      transition: 0.3s;
    }

    .menu-item > a:hover {
      background: #d60000;
      color: white;
    }

    /* dropdown */
    .dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      min-width: 200px;
      background: white;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
      border-top: 3px solid #d60000;
    }

    .dropdown a {
      display: block;
      padding: 12px 15px;
      color: black;
      border-bottom: 1px solid #eee;
    }

    .dropdown a:hover {
      background: #d60000;
      color: white;
      padding-left: 22px;
    }

    .menu-item:hover .dropdown {
      display: block;
    }

    /* 🔴 BOČNÝ PANEL */
    .fixed-contact {
      position: fixed;
      right: 0;
      bottom: 70px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      background: #d60000;
      border-radius: 6px 0 0 6px;
    }

    .fixed-contact a {
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      width: 34px;
      height: 34px;
      transition: transform 0.2s;
    }

    .fixed-contact a:hover {
      transform: scale(1.5);
      background: #a80000;
    }

  </style>
</head>

<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="#"><i class="fab fa-facebook-f"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fas fa-envelope"></i></a>
      <a href="#"><i class="fab fa-whatsapp"></i></a>
    </div>

    <div class="topbar-right">
      <a href="#"><i class="fas fa-phone"></i></a>
    </div>
  </div>

  <!-- LOGO -->
  <div class="header">
    <img src="logo.png" class="logo">
  </div>

  <!-- MENU -->
  <nav class="menu">

    <div class="menu-item">
      <a href="#">1</a>
      <div class="dropdown">
        <a href="#">1.1</a>
        <a href="#">1.2</a>
      </div>
    </div>

    <div class="menu-item">
      <a href="#">2</a>
      <div class="dropdown">
        <a href="#">2.1</a>
        <a href="#">2.2</a>
      </div>
    </div>

    <div class="menu-item">
      <a href="#">3</a>
      <div class="dropdown">
        <a href="#">3.1</a>
        <a href="#">3.2</a>
      </div>
    </div>

    <div class="menu-item">
      <a href="#">4</a>
      <div class="dropdown">
        <a href="#">4.1</a>
        <a href="#">4.2</a>
      </div>
    </div>

    <div class="menu-item">
      <a href="#">5</a>
      <div class="dropdown">
        <a href="#">5.1</a>
        <a href="#">5.2</a>
      </div>
    </div>

  </nav>

  <!-- BOČNÝ PANEL -->
  <div class="fixed-contact">
    <a href="#"><i class="fab fa-whatsapp"></i></a>
    <a href="#"><i class="fas fa-phone"></i></a>
    <a href="#"><i class="fas fa-envelope"></i></a>
  </div>

</body>
</html>
