<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Elektroludwig | Elektroinštalácie</title>

  <link rel="icon" type="image/png" href="./zalozka.png?v=2">
  <link rel="shortcut icon" type="image/png" href="./zalozka.png?v=2">
  <link rel="apple-touch-icon" href="./zalozka.png?v=2">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    /* 🔝 TOPBAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 40px 1px 40px; /* 🔥 minimum dole */
      background: #f5f5f5;
    }

    .topbar-left {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .topbar a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      font-size: 15px;
      border-radius: 5px;
      color: black;
      text-decoration: none;
      transition: 0.25s;
    }

    .topbar a:hover {
      transform: scale(1.3);
      color: white;
    }

    .facebook:hover { background: #1877f2; }
    .instagram:hover { background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af); }
    .email:hover { background: #8b5a2b; }
    .whatsapp:hover { background: #25d366; }
    .phone:hover { background: #6fcf97; }

    /* 🔲 HEADER – úplne natlačený */
    .header {
      text-align: center;
      padding: 0; /* 🔥 nič */
      margin: 0;
      background: white;
    }

    .logo {
      max-width: 420px;
      height: auto;
      display: block;
      margin: 0 auto; /* 🔥 bez medzery */
    }

    /* 🔽 MENU */
    .menu {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-top: -10px; /* jemné pritiahnutie */
      background: white;
    }

    .menu a {
      color: black;
      font-weight: bold;
      font-size: 15px;
      text-decoration: none;
      transition: 0.2s;
    }

    .menu a:hover {
      color: #d60000;
      transform: scale(1.25);
    }

    /* 🔴 BOČNÝ PANEL */
    .fixed-contact {
      position: fixed;
      right: 0;
      bottom: 70px;
      display: flex;
      flex-direction: column;
      background: #d60000;
      border-radius: 6px 0 0 6px;
    }

    .fixed-contact a {
      color: white;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      text-decoration: none;
    }

    .fixed-contact a:hover {
      transform: scale(1.5);
      background: #a80000;
    }

  </style>
</head>

<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">

      <a href="#" class="facebook">
        <i class="fab fa-facebook-f"></i>
      </a>

      <a href="#" class="instagram">
        <i class="fab fa-instagram"></i>
      </a>

      <a href="#" class="email">
        <i class="fas fa-envelope"></i>
      </a>

      <a href="#" class="whatsapp">
        <i class="fab fa-whatsapp"></i>
      </a>

    </div>

    <div>
      <a href="#" class="phone">
        <i class="fas fa-phone"></i>
      </a>
    </div>
  </div>

  <!-- LOGO -->
  <div class="header">
    <img src="logo.png" class="logo">
  </div>

  <!-- MENU -->
  <nav class="menu">
    <a href="kto-sme.html">Kto sme</a>
    <a href="#">Čo robíme</a>
    <a href="#">Kde sme pracovali</a>
    <a href="#">4</a>
    <a href="#">5</a>
  </nav>

  <!-- BOČNÝ PANEL -->
  <div class="fixed-contact">
    <a href="#"><i class="fab fa-whatsapp"></i></a>
    <a href="#"><i class="fas fa-phone"></i></a>
    <a href="#"><i class="fas fa-envelope"></i></a>
  </div>

</body>
</html>
