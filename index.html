    body {

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 40px;
      background: #f5f5f5;
      font-size: 13px;
    }

    .topbar-left {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .topbar-right {
      text-align: right;
    }

    a {
      color: black;
      text-decoration: none;
    }

    .topbar a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease;
      transform-origin: center;
    }

    .topbar a:hover {
      transform: scale(1.55);
    }

    .header {
      text-align: center;
      padding: 12px 0;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    .logo {
      max-width: 340px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* 🔽 HLAVNÉ MENU */
    .menu {
      background: #111;
      display: flex;
      justify-content: center;
      gap: 0;
      position: relative;
      z-index: 1000;
    }

    .menu-item {
      position: relative;
    }

    .menu-item > a {
      display: block;
      color: white;
      padding: 16px 28px;
      font-size: 15px;
      font-weight: bold;
      transition: 0.25s;
    }

    .menu-item > a:hover {
      background: #d60000;
    }

    /* 🔽 ROZBAĽOVACIE MOŽNOSTI */
    .dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      min-width: 220px;
      background: white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
      border-top: 3px solid #d60000;
    }

    .dropdown a {
      display: block;
      padding: 13px 18px;
      color: #111;
      font-size: 14px;
      border-bottom: 1px solid #eee;
      transition: 0.25s;
    }

    .dropdown a:hover {
      background: #d60000;
      color: white;
      padding-left: 25px;
    }

    .menu-item:hover .dropdown {
      display: block;
    }

    /* 🔴 ZVISLÝ BOČNÝ PANEL */
    .fixed-contact {
      position: fixed;
      right: 0;
      bottom: 70px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      background: #d60000;
      border-radius: 6px 0 0 6px;
      overflow: visible;
    }

    .fixed-contact a {
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      width: 34px;
      height: 34px;
      font-size: 15px;
      transition: transform 0.18s ease, background 0.18s ease;
      transform-origin: right center;
    }

    .fixed-contact a:hover {
      background: #a80000;
      transform: scale(1.45);
      border-radius: 6px 0 0 6px;
    }
