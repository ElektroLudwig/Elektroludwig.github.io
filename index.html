  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    /* 🔝 HORNÝ PÁS */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 40px;
      background: #f5f5f5;
      font-size: 13px;
    }

    .topbar-left {
      display: flex;
      gap: 15px;
    }

    .topbar-right {
      text-align: right;
    }

    /* 🔲 HEADER */
    .header {
      text-align: center;
      padding: 12px 0;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    a {
      color: black;
      text-decoration: none;
      transition: 0.3s;
    }

    a:hover {
      opacity: 0.6;
    }

    /* LOGO */
    .logo {
      max-width: 340px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* 🔴 FIXNÁ BOČNÁ LIŠTA */
    .fixed-contact {
      position: fixed;
      right: 0;
      top: 40%;
      transform: translateY(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
    }

    .fixed-contact a {
      background: #d60000;
      color: white;
      padding: 12px;
      font-size: 16px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      transition: 0.3s;
      width: 40px;
    }

    .fixed-contact a:hover {
      background: #a80000;
    }

  </style>
</head>

<body>

  <!-- TOPBAR -->
  <div class="topbar">
