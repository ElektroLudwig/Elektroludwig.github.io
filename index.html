  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 40px;
      background: #f5f5f5;
      font-size: 13px;
    }

    .topbar-left {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .topbar-right {
      text-align: right;
    }

    .header {
      text-align: center;
      padding: 12px 0;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    a {
      color: black;
      text-decoration: none;
    }

    .logo {
      max-width: 340px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* 🔥 VÝRAZNEJŠÍ HOVER PRE VRCHNÉ IKONY */
    .topbar a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease, opacity 0.18s ease;
      transform-origin: center;
    }

    .topbar a:hover {
      transform: scale(1.55);
      opacity: 1;
    }

    /* 🔴 ZVISLÝ BOČNÝ PANEL */
    .fixed-contact {
      position: fixed;
      right: 0;
      bottom: 70px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      background: #d60000;
      border-radius: 6px 0 0 6px;
      overflow: visible;
    }

    .fixed-contact a {
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      width: 34px;
      height: 34px;
      font-size: 15px;
      transition: transform 0.18s ease, background 0.18s ease;
      transform-origin: right center;
    }

    .fixed-contact a:hover {
      background: #a80000;
      transform: scale(1.45);
      border-radius: 6px 0 0 6px;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="topbar-left">
