<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Elektroludwig | Elektroinštalácie</title>

  <!-- 🔴 FAVICON (blesk v záložke) -->

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;

    /* 🔝 HORNÝ PÁS */
    .topbar {
      display: flex;

      align-items: center;

    }

    .topbar-left {

    .header {

      border-bottom: 1px solid #ddd;

    a {
      color: black;

    a:hover {
      opacity: 0.6;

    .logo {

      height: auto;
