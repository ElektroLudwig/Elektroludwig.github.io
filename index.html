<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Elektroludwig</title>

  <!-- ikonky -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: white;   /* ZMENENÉ */
      color: black;        /* ZMENENÉ */
      border-bottom: 1px solid #ddd; /* jemná čiara */
    }

    .left, .right {
      width: 33%;
    }

    .left {
      display: flex;
      gap: 15px;
    }

    .center {
      width: 33%;
      text-align: center;
    }

    .right {
      text-align: right;
    }

    a {
      color: black; /* ZMENENÉ */
      text-decoration: none;
      font-size: 16px;
      transition: 0.3s;
    }

    a:hover {
      opacity: 0.6;
    }

    h1 {
      margin: 0;
      font-size: 36px;
      font-weight: bold;
      color: black; /* ZMENENÉ */
    }

    .subtitle {
      font-size: 14px;
      color: #666; /* jemne sivé */
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <div class="header">
    
    <!-- ĽAVÁ STRANA -->
    <div class="left">
      <a href="#"><i class="fab fa-facebook-f"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="mailto:info@elektroludwig.sk"><i class="fas fa-envelope"></i></a>
    </div>

    <!-- STRED -->
    <div class="center">
      <h1>Elektroludwig</h1>
      <div class="subtitle">Elektroinštalácie Žilina a okolie</div>
    </div>

    <!-- PRAVÁ STRANA -->
    <div class="right">
      <a href="tel:+421000000000">📞</a>
    </div>

  </div>

</body>
</html>
